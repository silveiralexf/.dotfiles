# default_stages: [commit]
# Markdown/yaml/json lint and format, plan naming, Lua tests, extra hooks
fail_fast: true
repos:
  - repo: local
    hooks:
      - id: check-prereqs
        name: check-prereqs
        entry: bash scripts/check-prereqs.sh
        language: system
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        pass_filenames: true
        exclude: '\.(zsh|tmux)$|^etc/|^tmux/'
      - id: markdownlint
        name: markdownlint
        entry: markdownlint
        language: system
        types: [markdown]
        pass_filenames: true
        args: ["-c", ".markdownlint.yaml", "-i", "CHANGELOG.md"]
      - id: task-yamlfmt
        name: task-yamlfmt
        entry: task
        language: system
        args: [yamlfmt]
        types: [yaml]
        pass_filenames: false
      - id: task-jsonfmt
        name: task-jsonfmt
        entry: task
        language: system
        args: [jsonfmt]
        types: [json]
        pass_filenames: false
        exclude: '\^devbox.json/|^package.json/'
      - id: task-test-lua
        name: Run Lua tests (Busted)
        entry: task
        language: system
        args: ['test:lua']
        types: [lua]
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude_types:
          - "json"
      - id: end-of-file-fixer
        exclude_types:
          - "json"
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-case-conflict
      - id: debug-statements
  - repo: https://github.com/lunarmodules/luacheck
    rev: v1.2.0
    hooks:
      - id: luacheck
        name: Luacheck
        description: Lint and static analysis of Lua code
        entry: luacheck
        language: lua
        types: [lua]
