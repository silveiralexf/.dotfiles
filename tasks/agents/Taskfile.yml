# yaml-language-server: $schema=https://taskfile.dev/schema.json
# Agent workflow tasks: generate platform files, manage plans
version: "3"
tasks:
  generate:
    desc: Regenerate platform agent files from .agents/ source
    cmds:
      - "{{.DOTFILES_HOME}}/scripts/generate-agents.sh {{.CLI_ARGS}}"

  plan:rename:
    desc: Rename .agents/plans and .cursor/plans files to YYYY-MM-DD_username_slug.plan.md (--dry-run to preview)
    cmds:
      - "{{.DOTFILES_HOME}}/scripts/rename-cursor-plans.sh {{.CLI_ARGS}}"
