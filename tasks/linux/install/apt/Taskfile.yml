# yaml-language-server: $schema=https://taskfile.dev/schema.json
# Debian/Ubuntu: install base packages via apt. Run with task linux:install:apt:all
version: "3"
tasks:
  all:
    desc: Install base OS packages (Debian/Ubuntu)
    interactive: true
    cmds:
      - cmd: |
          echo ">>> Install required OS packages ..."
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          command -v eatmydata >/dev/null 2>&1 || sudo apt-get install -y --no-install-recommends eatmydata
      - for:
          - 7zip
          - build-essential
          - bzip2
          - ca-certificates
          - curl
          - dnsutils
          - erlang
          - ffmpeg
          - fonts-powerline
          - fzf
          - gnupg
          - gpg
          - gpg-agent
          - gpg2
          - jq
          - libaugeas0
          - libreadline-dev
          - locales
          - make
          - nginx
          - nodejs
          - npm
          - pre-commit
          - procps
          - python3
          - python3-venv
          - silversearcher-ag
          - socat
          - software-properties-common
          - sqlite3
          - unzip
          - wget
          - xz-utils
          - yq
          - zoxide
        cmd: sudo eatmydata apt-get install -y --no-install-recommends {{.ITEM}} || sudo apt-get install -y --no-install-recommends {{.ITEM}}
      - cmd: |-
          echo ">>> Clean-up package manager ..."
          sudo apt-get clean autoclean -y && sudo apt-get autoremove --yes
