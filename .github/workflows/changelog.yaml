# Generate CHANGELOG.md when changes are pushed to main/master. Commits and pushes the update.
# Runs on every push (so it appears in Actions); only commits changelog when branch is main or master.
# Reference: enkub-io/enkub .github/workflows/changelog.yaml

name: changelog

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Devbox and project dependencies
        uses: jetify-com/devbox-install-action@v0.14.0

      - name: Generate CHANGELOG.md
        run: devbox run -- task changelog

      - name: Commit and push CHANGELOG.md
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
          else
            git commit -m "chore: update CHANGELOG.md [skip ci]"
            git push
          fi
