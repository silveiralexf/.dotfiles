# Run pre-commit hooks and Lua tests on PR and on push to main/master.
# Reference: enkub-io/enkub .github/workflows/pre-commit.yaml

name: pre-commit

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  precommit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Devbox and project dependencies
        uses: jetify-com/devbox-install-action@v0.14.0

      - name: Install node dependencies (markdownlint, etc.)
        run: devbox run precommit-install

      - name: Run pre-commit
        run: devbox run -- pre-commit run --all-files

      - name: Install Lua 5.4 and dependencies for tests
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lua5.4 liblua5.4-dev
          luarocks --lua-version 5.4 install luafilesystem
          luarocks --lua-version 5.4 install busted

      - name: Run Lua tests
        run: |
          export LUA_PATH='/home/runner/work/.dotfiles/.dotfiles/lua_modules/share/lua/5.4/?.lua;/home/runner/work/.dotfiles/.dotfiles/lua_modules/share/lua/5.4/?/init.lua;;'
          export LUA_CPATH='/home/runner/work/.dotfiles/.dotfiles/lua_modules/lib/lua/5.4/?.so;;'
          lua5.4 tests/run_features.lua
          lua5.4 /home/runner/work/.dotfiles/.dotfiles/lua_modules/lib/luarocks/rocks-5.4/busted/2.3.0-1/bin/busted tests/spec --no-coverage
