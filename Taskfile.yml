# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
dotenv: [".env"]
vars:
  SHELL: /usr/bin/env bash -o pipefail
  DOTFILES_HOME: "{{.USER_WORKING_DIR}}"
  DOTFILES_CONFIG: "{{.DOTFILES_HOME}}/etc/config"
  DOTFILES_PROFILE: "{{.DOTFILES_HOME}}/etc/profile"
  DOTFILES_RC: "{{.DOTFILES_HOME}}/etc/rc"
  DOTFILES_SCRIPTS: "{{.DOTFILES_HOME}}/scripts"
includes:
  common:install:core:
    taskfile: ./tasks/common/install/core/Taskfile.yml
  linux:install:apt:
    taskfile: ./tasks/linux/install/apt/Taskfile.yml
  macos:install:brew:
    taskfile: ./tasks/macos/install/brew/Taskfile.yml
  macos:install:core:
    taskfile: ./tasks/macos/install/core/Taskfile.yml
  macos:install:docker:
    taskfile: ./tasks/macos/install/docker/Taskfile.yml
  macos:install:go:
    taskfile: ./tasks/macos/install/go/Taskfile.yml
  macos:install:java:
    taskfile: ./tasks/macos/install/java/Taskfile.yml
  macos:install:k8s:
    taskfile: ./tasks/macos/install/k8s/Taskfile.yml
  macos:install:hammerspoon:
    taskfile: ./tasks/macos/install/hammerspoon/Taskfile.yml
  macos:install:rust:
    taskfile: ./tasks/macos/install/rust/Taskfile.yml
tasks:
  default:
    cmds:
      - task: list
    silent: true
  list:
    desc: Lists available commands
    cmds:
      - task -l
  hooks:
    desc: Setup git hooks locally
    cmds:
      - cp scripts/hooks/* .git/hooks/
    silent: true
  test:lua:
    desc: "Run Lua Gherkin features (byfeature-style output with colors) and Busted specs"
    dir: "{{.DOTFILES_HOME}}"
    cmds:
      - cmd: "LUA_PATH='{{.DOTFILES_HOME}}/lua_modules/share/lua/5.4/?.lua;{{.DOTFILES_HOME}}/lua_modules/share/lua/5.4/?/init.lua;;' LUA_CPATH='{{.DOTFILES_HOME}}/lua_modules/lib/lua/5.4/?.so;;' lua tests/run_features.lua"
      - cmd: "LUA_PATH='{{.DOTFILES_HOME}}/lua_modules/share/lua/5.4/?.lua;{{.DOTFILES_HOME}}/lua_modules/share/lua/5.4/?/init.lua;;' LUA_CPATH='{{.DOTFILES_HOME}}/lua_modules/lib/lua/5.4/?.so;;' lua {{.DOTFILES_HOME}}/lua_modules/lib/luarocks/rocks-5.4/busted/2.3.0-1/bin/busted tests/spec --no-coverage"
  precommit:
    desc: Verifies and fix requirements for new commits
    cmds:
      - scripts/hooks/pre-commit
  markdownlint:
    desc: Lint Markdown with markdownlint-cli (.markdownlint.yaml)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - cmd: "markdownlint -c .markdownlint.yaml '**/*.md' -i CHANGELOG.md"
  yamlfmt:
    desc: "Format YAML files with yamlfmt (install with: go install github.com/google/yamlfmt/cmd/yamlfmt@latest)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        find . \( -name "*.yaml" -o -name "*.yml" \) \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          -not -path "./.devbox/*" \
          -exec yamlfmt -w {} + 2>/dev/null || true
  jsonfmt:
    desc: Format JSON with jq (sort keys, validate)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        for f in $(git ls-files '*.json' 2>/dev/null); do
          [ -f "$f" ] && jq -e . "$f" >/dev/null 2>&1 && jq -S . "$f" > "$f.tmp" && mv "$f.tmp" "$f" || true
        done
  version:next:
    desc: "Calculate next semver from conventional commits since last v* tag (feat→minor, fix→patch, breaking→major)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - scripts/calc-next-version.sh
  changelog:
    silent: true
    desc: Generates CHANGELOG
    cmds:
      - echo "Updating Changelog"
      - cmd: |-
          export RUST_LOG=error
          git cliff --context \
          | jq '.[].commits.[] |= (. + {extra: {date: ( .committer.timestamp | strftime("%Y-%m-%d") )}} ) | sort_by(.commits.[].commit.committer.timestamp)' \
          | jq -S 'walk(if type == "array" then sort_by(.timestamp) | reverse else . end)' \
          | git cliff --from-context - > CHANGELOG.md
      - cmd: git add {{.USER_WORKING_DIR}}/CHANGELOG.md
  changelog:rewrite-history:
    desc: "Rewrite all commit messages to conventional format (DESTRUCTIVE; backup first, then force-push)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        echo "This rewrites git history (new SHAs). Backup first: git clone --mirror . ../.dotfiles-backup.git"
        echo "After running: git push --force-with-lease"
        read -p "Continue? [y/N] " r; [[ "$r" != "y" && "$r" != "Y" ]] && exit 1
        git filter-branch -f --msg-filter "{{.TASKFILE_DIR}}/scripts/rewrite-commit-messages.sh" -- --all
  devbox:install-cli:
    desc: Install Devbox CLI (required before devbox:install; uses official install script)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        if command -v devbox >/dev/null 2>&1; then
          echo "devbox already installed: $(devbox version 2>/dev/null || devbox --version 2>/dev/null || true)"
          exit 0
        fi
        echo "Installing Devbox via official script (https://www.jetify.com/docs/devbox/installing-devbox)..."
        echo "Devbox may install Nix if not present. Run as non-root on Linux."
        curl -fsSL https://get.jetify.com/devbox | bash
  devbox:install:
    desc: Install devbox dependencies (run once after clone or when devbox.json changes)
    dir: "{{.TASKFILE_DIR}}"
    preconditions:
      - sh: command -v devbox
        msg: "devbox not in PATH. Run 'task devbox:install-cli' first, then retry."
      - sh: test -f "{{.TASKFILE_DIR}}/devbox.json"
        msg: "devbox.json not found in project root."
    cmds:
      - devbox install
  devbox:shell:
    desc: Enter devbox shell with all dev tools on PATH
    dir: "{{.TASKFILE_DIR}}"
    preconditions:
      - sh: command -v devbox
        msg: "devbox not in PATH. Run 'task devbox:install-cli' first."
      - sh: test -f "{{.TASKFILE_DIR}}/devbox.json"
        msg: "devbox.json not found in project root."
    cmds:
      - devbox shell
  devbox:add:
    desc: "Add a package to devbox.json and pull globally. Usage: task devbox:add -- <package@version>"
    dir: "{{.TASKFILE_DIR}}"
    preconditions:
      - sh: command -v devbox
        msg: "devbox not in PATH. Run 'task devbox:install-cli' first."
      - sh: test -f "{{.TASKFILE_DIR}}/devbox.json"
        msg: "devbox.json not found in project root."
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "No package specified. Usage: task devbox:add -- <package@version>"
    cmds:
      - devbox add {{.CLI_ARGS}}
      - devbox global pull {{.TASKFILE_DIR}}/devbox.json -f
  devbox:gc:
    desc: Run Nix garbage collection and store optimisation to reclaim disk space
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - nix-collect-garbage -d
      - nix-store --optimise
  nvim:update:
    desc: Download and install the latest Neovim nightly from upstream (always runs)
    cmds:
      - task: common:install:core:nvim:update
  nvim:deps:
    desc: Install and verify all Neovim external deps (tree-sitter via prebuilt binary; rest via devbox)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        # tree-sitter: nixpkgs tops out at 0.25.x; nvim-treesitter requires 0.26.1+
        # cargo build fails on Linux due to clang/system header path issues, so use the prebuilt binary.
        TS_VERSION="0.26.7"
        if command -v tree-sitter >/dev/null 2>&1 && tree-sitter --version 2>/dev/null | grep -qE '0\.2[6-9]\.'; then
          echo "  ✓ tree-sitter ($(tree-sitter --version | head -1))"
        else
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  TS_ASSET="tree-sitter-linux-x64" ;;
            Linux-aarch64) TS_ASSET="tree-sitter-linux-arm64" ;;
            Darwin-x86_64) TS_ASSET="tree-sitter-macos-x64" ;;
            Darwin-arm64)  TS_ASSET="tree-sitter-macos-arm64" ;;
            *) echo "  ✗ unsupported platform for tree-sitter prebuilt binary" >&2; exit 1 ;;
          esac
          echo "  ↳ downloading tree-sitter v${TS_VERSION} (${TS_ASSET})..."
          URL="https://github.com/tree-sitter/tree-sitter/releases/download/v${TS_VERSION}/${TS_ASSET}.gz"
          curl -fsSL "$URL" | gunzip -c > "${HOME}/.local/bin/tree-sitter"
          chmod +x "${HOME}/.local/bin/tree-sitter"
          echo "  ✓ tree-sitter ($(tree-sitter --version | head -1))"
        fi
      - |
        ok=1
        for tool in stylua shfmt ruff prettierd gopls rust-analyzer gofumpt golangci-lint govulncheck dlv chafa viu; do
          if command -v "$tool" >/dev/null 2>&1; then
            echo "  ✓ $tool"
          else
            echo "  ✗ $tool - not found (run 'devbox install' or 'devbox global pull devbox.json -f')" >&2
            ok=0
          fi
        done
        [ "$ok" -eq 1 ] || exit 1
      - echo "All deps present. For LuaRocks run 'task nvim:luarocks-build', for blink.cmp native lib run 'task nvim:blink-build'."
  nvim:luarocks-build:
    desc: Run LuaRocks.nvim build once (compiles local LuaRocks; then setup() installs rocks)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        PLUGIN_DIR=$(find "${XDG_DATA_HOME:-$HOME/.local/share}/nvim/site/pack" -maxdepth 4 -type d -name "luarocks.nvim" 2>/dev/null | head -1)
        if [ -z "$PLUGIN_DIR" ]; then
          echo "luarocks.nvim not found in pack dir. Start nvim once so plugins are installed, then run this task again." >&2
          exit 1
        fi
        if [ ! -f "$PLUGIN_DIR/build.lua" ]; then
          echo "build.lua not found in $PLUGIN_DIR" >&2
          exit 1
        fi
        echo "Running LuaRocks.nvim build in $PLUGIN_DIR ..."
        LUA51_PREFIX=$(ls -d /nix/store/*lua-5.1*[^.drv] 2>/dev/null | head -1)
        if [ -n "$LUA51_PREFIX" ] && [ -f "$LUA51_PREFIX/bin/lua" ]; then
          TMPLUA=$(mktemp -d)
          mkdir -p "$TMPLUA/bin" "$TMPLUA/include"
          ln -s "$LUA51_PREFIX/bin/lua" "$TMPLUA/bin/lua5.1"
          ln -s "$LUA51_PREFIX/include" "$TMPLUA/include/lua5.1"
          export PATH="$TMPLUA/bin:$PATH"
        fi
        cd "$PLUGIN_DIR" && nvim -l build.lua
        [ -n "$TMPLUA" ] && rm -rf "$TMPLUA"
  nvim:blink-build:
    desc: Build blink.cmp native fuzzy lib from source via cargo (fixes blink_cmp_fuzzy checkhealth warning)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        PLUGIN_DIR=$(find "${XDG_DATA_HOME:-$HOME/.local/share}/nvim/site/pack" -maxdepth 4 -type d -name "blink.cmp" 2>/dev/null | head -1)
        if [ -z "$PLUGIN_DIR" ]; then
          echo "blink.cmp not found in pack dir. Start nvim once so plugins are installed, then run this task again." >&2
          exit 1
        fi
        echo "Building blink.cmp native fuzzy lib in $PLUGIN_DIR ..."
        cd "$PLUGIN_DIR" && cargo build --release
        echo "Done. Restart Neovim and run :checkhealth to verify."
  nvim:pack-lock-sync:
    desc: Sync nvim-pack-lock.json with full SHAs from installed plugins (fixes vim.pack lockfile checkhealth errors)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - nvim -l {{.TASKFILE_DIR}}/scripts/nvim-pack-lock-sync.lua
  nvim:reset:
    desc: "Backup ~/.local/share/nvim, ~/.local/state/nvim, ~/.cache/nvim with timestamped suffix (e.g. nvim.bak-YYYYMMDD-HHMMSS). Leaves ~/.config/nvim untouched so your config (or symlink) stays; start nvim and pack will auto-install plugins from scratch like Lazy did."
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - ./scripts/backup-nvim-dirs.sh
  nvim:restore:
    desc: "Rollback to the most recent nvim backup (nvim.bak-*). Stashes any current dirs as nvim.broken-TIMESTAMP before restoring, so nothing is lost."
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - ./scripts/restore-nvim-dirs.sh
  linux:install:all:
    desc: Install base packages and core setup on Linux (apt + common core)
    cmds:
      - task: linux:install:apt:all
      - task: common:install:core:all
  macos:install:all:
    desc: Install all MacOS required tools
    cmds:
      - task: macos:install:brew:all
      - task: macos:install:core:all
      - task: macos:install:docker:all
      - task: macos:install:go:all
      - task: macos:install:k8s:all
      - task: macos:install:java:all
      - task: macos:install:npm:all
      - task: macos:install:python:all
      - task: macos:install:rust:all
